<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - Voice Only Video Maker</title>
    <style>
        body { background: #000; color: #0ff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        #canvas-container { width: 100%; max-width: 600px; margin: 10px auto; border: 2px solid #0ff; border-radius: 10px; overflow: hidden; box-shadow: 0 0 15px #0ff; }
        canvas { width: 100%; height: auto; display: block; background: #000; }
        textarea { width: 90%; height: 100px; background: #111; color: #fff; border: 1px solid #0ff; padding: 10px; margin-top: 10px; border-radius: 8px; font-size: 16px; outline: none; }
        .controls { margin: 20px; }
        button { padding: 15px 30px; background: #0ff; color: #000; font-weight: bold; border: none; cursor: pointer; border-radius: 30px; width: 80%; font-size: 18px; }
        button:disabled { background: #444; color: #888; }
        #status { font-size: 14px; margin-top: 10px; color: #0ff; }
    </style>
</head>
<body>

    <h2 style="text-shadow: 0 0 10px #0ff;">STGV ప్రో వీడియో మేకర్</h2>
    <div id="status">రెడీగా ఉంది...</div>

    <div id="canvas-container">
        <canvas id="videoCanvas" width="1280" height="720"></canvas>
    </div>

    <textarea id="videoText">నమస్కారం! STGV భవిష్యవాణికి స్వాగతం. ఇప్పుడు బ్యాక్‌గ్రౌండ్ మ్యూజిక్ లేకుండా కేవలం వాయిస్ మాత్రమే రికార్డ్ అవుతుంది.</textarea>

    <div class="controls">
        <button id="startBtn" onclick="startProduction()">వీడియోను రికార్డ్ చేయి</button>
    </div>

    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const textArea = document.getElementById('videoText');
        const startBtn = document.getElementById('startBtn');

        const logo = new Image(); logo.src = 'logo.png';
        const bgImg = new Image(); bgImg.src = 'bg.jpg';

        let currentText = "";
        let charIndex = 0;
        let chunks = [];

        function drawScene() {
            // 1. బ్యాక్‌గ్రౌండ్ ఇమేజ్
            if (bgImg.complete && bgImg.naturalWidth !== 0) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(0, 0, 0, 0.65)"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#000810";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 2. లోగో
            if (logo.complete && logo.naturalWidth !== 0) {
                ctx.drawImage(logo, canvas.width - 160, 40, 120, 120);
            }

            // 3. టెక్స్ట్ బాక్స్
            ctx.fillStyle = "rgba(0, 30, 50, 0.85)";
            ctx.strokeStyle = "#0ff";
            ctx.lineWidth = 4;
            ctx.strokeRect(100, canvas.height - 230, canvas.width - 200, 150);
            ctx.fillRect(100, canvas.height - 230, canvas.width - 200, 150);

            // 4. తెలుగు టెక్స్ట్
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 46px Arial";
            ctx.textAlign = "center";
            ctx.fillText(currentText, canvas.width/2, canvas.height - 140);
        }

        async function startProduction() {
            startBtn.disabled = true;
            status.innerText = "వీడియో రికార్డ్ అవుతోంది... ప్లీజ్ వెయిట్";
            
            // కేవలం కాన్వాస్ వీడియో స్ట్రీమ్ మాత్రమే తీసుకుంటున్నాము
            const videoStream = canvas.captureStream(25);
            
            const recorder = new MediaRecorder(videoStream, { mimeType: 'video/webm' });
            chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'STGV_Voice_Video.webm';
                a.click();
                status.innerText = "వీడియో డౌన్లోడ్ అయ్యింది!";
                startBtn.disabled = false;
            };

            const utterance = new SpeechSynthesisUtterance(textArea.value);
            utterance.lang = 'te-IN';
            utterance.rate = 0.9;

            recorder.start();
            charIndex = 0;
            
            const typing = setInterval(() => {
                if (charIndex <= textArea.value.length) {
                    currentText = textArea.value.substring(0, charIndex);
                    charIndex++;
                    drawScene();
                } else {
                    clearInterval(typing);
                }
            }, 75);

            window.speechSynthesis.speak(utterance);

            utterance.onend = () => {
                setTimeout(() => {
                    recorder.stop();
                }, 1000);
            };
        }

        setInterval(drawScene, 100);
    </script>
</body>
</html>
