<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV Pro Audio Fix</title>
    <style>
        body { background: #000; color: #0ff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        #canvas-container { width: 100%; max-width: 600px; margin: 10px auto; border: 2px solid #0ff; }
        canvas { width: 100%; height: auto; display: block; background: #000; }
        textarea { width: 90%; height: 80px; background: #111; color: #fff; border: 1px solid #0ff; padding: 10px; margin-top: 10px; border-radius: 5px; }
        button { padding: 12px 25px; background: #00ffff; color: #000; font-weight: bold; border: none; cursor: pointer; border-radius: 25px; margin-top: 10px; }
        #status { font-size: 14px; margin-top: 10px; color: #0ff; }
    </style>
</head>
<body>

    <h3>STGV ఆడియో ఫిక్స్డ్ వీడియో మేకర్</h3>
    <div id="status">Ready</div>

    <div id="canvas-container">
        <canvas id="videoCanvas" width="1280" height="720"></canvas>
    </div>

    <textarea id="videoText">నమస్కారం! STGV భవిష్యవాణికి స్వాగతం. ఈ వీడియోలో ఆడియో మరియు వీడియో రెండూ స్పష్టంగా వస్తాయి.</textarea>

    <div class="controls">
        <button id="startBtn" onclick="startProduction()">వీడియోను తయారు చేయి</button>
    </div>

    <audio id="bgMusic" src="music.mp3" loop crossorigin="anonymous"></audio>

    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgMusic');
        const status = document.getElementById('status');
        const textArea = document.getElementById('videoText');
        const startBtn = document.getElementById('startBtn');

        const logo = new Image(); logo.src = 'logo.png';
        const bgImg = new Image(); bgImg.src = 'bg.jpg';

        let currentText = "";
        let charIndex = 0;
        let chunks = [];

        function draw() {
            if (bgImg.complete && bgImg.naturalWidth !== 0) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#000b14"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (logo.complete && logo.naturalWidth !== 0) {
                ctx.drawImage(logo, canvas.width - 150, 30, 110, 110);
            }

            ctx.fillStyle = "rgba(0, 20, 40, 0.85)";
            ctx.strokeStyle = "#0ff";
            ctx.strokeRect(80, canvas.height - 220, canvas.width - 160, 140);
            ctx.fillRect(80, canvas.height - 220, canvas.width - 160, 140);

            ctx.fillStyle = "white";
            ctx.font = "bold 45px Arial";
            ctx.textAlign = "center";
            ctx.fillText(currentText, canvas.width/2, canvas.height - 135);
        }

        function animateText(fullText) {
            if (charIndex <= fullText.length) {
                currentText = fullText.substring(0, charIndex);
                charIndex++;
                draw();
                setTimeout(() => animateText(fullText), 70);
            }
        }

        async function startProduction() {
            status.innerText = "వాయిస్ ఓవర్ రికార్డ్ అవుతోంది...";
            startBtn.disabled = true;
            
            // మొబైల్ ఆడియో కాంటెక్స్ట్
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();

            // మ్యూజిక్ ని డెస్టినేషన్ కి కనెక్ట్ చేయడం
            audio.volume = 0.05;
            try {
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(dest);
                source.connect(audioCtx.destination);
                audio.play();
            } catch(e) {}

            const videoStream = canvas.captureStream(25);
            
            // IMPORTANT: ఆడియో ట్రాక్స్ ఉన్నాయో లేదో చెక్ చేసి కలపడం
            const tracks = [...videoStream.getVideoTracks(), ...dest.stream.getAudioTracks()];
            const combined = new MediaStream(tracks);

            const recorder = new MediaRecorder(combined, { mimeType: 'video/webm' });
            chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'STGV_Final_Video.webm'; a.click();
                status.innerText = "డౌన్లోడ్ అయ్యింది! ఒకవేళ ఆడియో రాకపోతే స్క్రీన్ రికార్డర్ వాడండి.";
                startBtn.disabled = false;
            };

            const utterance = new SpeechSynthesisUtterance(textArea.value);
            utterance.lang = 'te-IN';
            utterance.rate = 0.9;

            recorder.start();
            charIndex = 0;
            animateText(textArea.value);
            window.speechSynthesis.speak(utterance);

            utterance.onend = () => {
                setTimeout(() => recorder.stop(), 1000);
                audio.pause();
            };
        }
        setInterval(draw, 50);
    </script>
</body>
</html>
