<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - Vishwanetra Video Maker</title>
    <style>
        body { background: #000; color: #0ff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        #canvas-container { width: 100%; max-width: 800px; margin: 10px auto; border: 3px solid #0ff; box-shadow: 0 0 20px #0ff; border-radius: 10px; overflow: hidden; }
        canvas { width: 100%; height: auto; display: block; background: #000; }
        textarea { width: 90%; height: 100px; background: #111; color: #fff; border: 1px solid #0ff; padding: 10px; margin-top: 10px; border-radius: 8px; font-size: 16px; outline: none; }
        .controls { margin: 20px; }
        button { padding: 15px 35px; background: #00ffff; color: #000; font-weight: bold; border: none; cursor: pointer; border-radius: 30px; font-size: 18px; box-shadow: 0 5px 15px rgba(0,255,255,0.4); transition: 0.3s; }
        button:disabled { background: #444; color: #777; box-shadow: none; }
        #status { font-size: 14px; margin: 10px; color: #0ff; padding: 5px; }
    </style>
</head>
<body>

    <h2 style="text-shadow: 0 0 10px #0ff;">STGV ప్రో వీడియో మేకర్</h2>
    <div id="status">సిద్ధంగా ఉంది...</div>

    <div id="canvas-container">
        <canvas id="videoCanvas" width="1280" height="720"></canvas>
    </div>

    <textarea id="videoText">నమస్కారం! STGV భవిష్యవాణికి స్వాగతం. ఈరోజు మనం AI టెక్నాలజీ గురించి తెలుసుకుందాం. మరిన్ని వివరాల కోసం సబ్‌స్క్రైబ్ చేయండి!</textarea>

    <div class="controls">
        <button id="startBtn" onclick="startProduction()">వీడియోను రికార్డ్ చేయి</button>
    </div>

    <audio id="bgMusic" src="music.mp3" loop crossorigin="anonymous"></audio>

    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgMusic');
        const status = document.getElementById('status');
        const textArea = document.getElementById('videoText');
        const startBtn = document.getElementById('startBtn');

        // చిత్రాలను లోడ్ చేయడం
        const logo = new Image(); logo.src = 'logo.png';
        const bgImg = new Image(); bgImg.src = 'bg.jpg';

        let currentText = "";
        let charIndex = 0;
        let chunks = [];

        // స్క్రీన్‌ను గీయడం (Main Drawing Function)
        function drawScene() {
            // 1. బ్యాక్‌గ్రౌండ్ ఇమేజ్ (ఇక్కడ సరిచేసాను)
            if (bgImg.complete && bgImg.naturalWidth !== 0) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                // ఫోటో పైన టెక్స్ట్ కనిపించడానికి చీకటి పొర
                ctx.fillStyle = "rgba(0, 0, 0, 0.65)"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                // ఒకవేళ ఫోటో లేకపోతే నలుపు రంగు
                ctx.fillStyle = "#000810";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 2. లోగో గీయడం
            if (logo.complete && logo.naturalWidth !== 0) {
                ctx.shadowColor = "#0ff"; ctx.shadowBlur = 10;
                ctx.drawImage(logo, canvas.width - 160, 40, 120, 120);
                ctx.shadowBlur = 0;
            }

            // 3. డిజిటల్ టెక్స్ట్ బాక్స్
            ctx.fillStyle = "rgba(0, 30, 50, 0.85)";
            ctx.strokeStyle = "#0ff";
            ctx.lineWidth = 4;
            ctx.strokeRect(100, canvas.height - 230, canvas.width - 200, 150);
            ctx.fillRect(100, canvas.height - 230, canvas.width - 200, 150);

            // 4. తెలుగు టెక్స్ట్
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 46px 'Segoe UI', Arial";
            ctx.textAlign = "center";
            ctx.fillText(currentText, canvas.width/2, canvas.height - 140);
        }

        // వీడియో తయారీ ప్రక్రియ
        async function startProduction() {
            startBtn.disabled = true;
            status.innerText = "వీడియో తయారవుతోంది... దయచేసి వేచి ఉండండి";
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();

            // ఆడియో మిక్సింగ్
            audio.volume = 0.08;
            try {
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(dest);
                source.connect(audioCtx.destination);
                audio.play();
            } catch(e) { console.error("Audio mixing error"); }

            const videoStream = canvas.captureStream(25);
            const combined = new MediaStream([...videoStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
            
            const recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp8' });
            chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'STGV_Final_Video.webm';
                a.click();
                status.innerText = "డౌన్లోడ్ పూర్తయింది!";
                startBtn.disabled = false;
            };

            const utterance = new SpeechSynthesisUtterance(textArea.value);
            utterance.lang = 'te-IN';
            utterance.rate = 0.85;

            recorder.start();
            charIndex = 0;
            
            // టెక్స్ట్ టైపింగ్ ఎఫెక్ట్
            const typing = setInterval(() => {
                if (charIndex <= textArea.value.length) {
                    currentText = textArea.value.substring(0, charIndex);
                    charIndex++;
                    drawScene();
                } else {
                    clearInterval(typing);
                }
            }, 70);

            window.speechSynthesis.speak(utterance);

            utterance.onend = () => {
                setTimeout(() => {
                    recorder.stop();
                    audio.pause();
                }, 1500);
            };
        }

        // ఇమేజెస్ లోడ్ అయినప్పుడు స్క్రీన్ గీయడం ప్రారంభించండి
        bgImg.onload = drawScene;
        logo.onload = drawScene;
        setInterval(drawScene, 100); // యానిమేషన్ కంటిన్యూ చేయడానికి
    </script>
</body>
</html>
