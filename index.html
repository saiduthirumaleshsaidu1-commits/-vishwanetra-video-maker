<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV భవిష్యవాణి - ప్రో వీడియో మేకర్</title>
    <style>
        body { background: #000; color: #0ff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        #canvas-container { width: 100%; max-width: 800px; margin: 10px auto; border: 3px solid #0ff; box-shadow: 0 0 20px #0ff; }
        canvas { width: 100%; height: auto; display: block; background: #000; }
        textarea { width: 90%; height: 100px; background: #111; color: #fff; border: 1px solid #0ff; padding: 10px; margin-top: 10px; border-radius: 8px; font-size: 16px; }
        .controls { margin: 20px; }
        button { padding: 15px 35px; background: #00ffff; color: #000; font-weight: bold; border: none; cursor: pointer; border-radius: 30px; font-size: 18px; box-shadow: 0 5px 15px rgba(0,255,255,0.3); }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        #status { font-size: 16px; margin: 10px; color: #fff; background: rgba(0,255,255,0.1); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2 style="color: #0ff; text-shadow: 0 0 10px #0ff;">STGV ప్రో వీడియో మేకర్</h2>
    <div id="status">వీడియో తయారు చేయడానికి సిద్ధంగా ఉంది</div>

    <div id="canvas-container">
        <canvas id="videoCanvas" width="1280" height="720"></canvas>
    </div>

    <textarea id="videoText">నమస్కారం! STGV భవిష్యవాణికి స్వాగతం. ఈరోజు మనం సరికొత్త టెక్నాలజీ గురించి తెలుసుకుందాం. వీడియో నచ్చితే సబ్‌స్క్రైబ్ చేయండి!</textarea>

    <div class="controls">
        <button id="startBtn" onclick="startProduction()">వీడియోను రికార్డ్ చేయి</button>
    </div>

    <audio id="bgMusic" src="music.mp3" loop crossorigin="anonymous"></audio>

    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgMusic');
        const status = document.getElementById('status');
        const textArea = document.getElementById('videoText');
        const startBtn = document.getElementById('startBtn');

        const logo = new Image(); logo.src = 'logo.png';
        const bgImg = new Image(); bgImg.src = 'bg.jpg';

        let currentText = "";
        let charIndex = 0;
        let chunks = [];

        function drawFrame() {
            // 1. బ్యాక్‌గ్రౌండ్
            if (bgImg.complete && bgImg.naturalWidth !== 0) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#000810"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 2. లోగో
            if (logo.complete && logo.naturalWidth !== 0) {
                ctx.drawImage(logo, canvas.width - 160, 40, 120, 120);
            }

            // 3. డిజిటల్ బాక్స్
            ctx.fillStyle = "rgba(0, 25, 45, 0.85)";
            ctx.strokeStyle = "#0ff";
            ctx.lineWidth = 4;
            ctx.strokeRect(100, canvas.height - 220, canvas.width - 200, 140);
            ctx.fillRect(100, canvas.height - 220, canvas.width - 200, 140);

            // 4. టెక్స్ట్
            ctx.fillStyle = "#fff";
            ctx.font = "bold 45px 'Segoe UI', Arial";
            ctx.textAlign = "center";
            ctx.fillText(currentText, canvas.width/2, canvas.height - 135);
        }

        async function startProduction() {
            startBtn.disabled = true;
            status.innerText = "ప్రాసెసింగ్... వాయిస్ ఓవర్ రికార్డ్ అవుతోంది";
            
            // ఆడియో కాంటెక్స్ట్ సెటప్
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();

            // బ్యాక్‌గ్రౌండ్ మ్యూజిక్ మిక్సింగ్
            audio.volume = 0.08;
            try {
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(dest);
                source.connect(audioCtx.destination);
                audio.play();
            } catch(e) { console.warn("Audio Context Error:", e); }

            const videoStream = canvas.captureStream(25);
            const combinedStream = new MediaStream([
                ...videoStream.getVideoTracks(),
                ...dest.stream.getAudioTracks()
            ]);

            const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp8' });
            chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = exportVideo;

            const utterance = new SpeechSynthesisUtterance(textArea.value);
            utterance.lang = 'te-IN';
            utterance.rate = 0.9;

            // రికార్డింగ్ మొదలు
            recorder.start();
            charIndex = 0;
            const typingInterval = setInterval(() => {
                if (charIndex <= textArea.value.length) {
                    currentText = textArea.value.substring(0, charIndex);
                    charIndex++;
                    drawFrame();
                } else {
                    clearInterval(typingInterval);
                }
            }, 70);

            window.speechSynthesis.speak(utterance);

            utterance.onend = () => {
                setTimeout(() => {
                    recorder.stop();
                    audio.pause();
                }, 1000);
            };
        }

        function exportVideo() {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'STGV_Video.webm';
            a.click();
            status.innerText = "వీడియో తయారైంది! గ్యాలరీలో ప్లే కాకపోతే VLC వాడండి.";
            startBtn.disabled = false;
        }

        // ఇమేజ్ లోడ్ అయినప్పుడు మొదటి ఫ్రేమ్ గీయండి
        bgImg.onload = drawFrame;
        setInterval(drawFrame, 100);
    </script>
</body>
  </html>
