<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <title>STGV Pro Video Maker</title>
    <style>
        body { background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        #canvas-container { position: relative; border: 4px solid #111; display: inline-block; box-shadow: 0 0 30px #00ffff33; }
        canvas { background: #000; display: block; }
        .controls { margin-top: 20px; }
        button { padding: 12px 25px; font-weight: bold; cursor: pointer; background: #00ffff; border: none; border-radius: 5px; }
        #status { margin-top: 10px; color: #00ffff; }
    </style>
</head>
<body>

    <h2 style="color: #00ffff;">STGV ఫ్యూచర్ వీడియో మేకర్ (Pro)</h2>
    
    <div id="canvas-container">
        <canvas id="videoCanvas" width="1280" height="720"></canvas>
    </div>

    <div class="controls">
        <button onclick="startProduction()">లోగో & మ్యూజిక్‌తో వీడియో తయారు చేయి</button>
    </div>
    <div id="status">లోగో మరియు మ్యూజిక్ ఫైల్స్ ఒకే ఫోల్డర్‌లో ఉండేలా చూసుకోండి.</div>

    <audio id="bgMusic" src="music.mp3" loop></audio>

    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const audio = document.getElementById('bgMusic');

        const message = "2030 నాటికి సాంకేతికత కొత్త పుంతలు తొక్కుతుంది...";
        let currentText = "";
        let charIndex = 0;
        let chunks = [];

        // లోగో ఇమేజ్ లోడ్ చేయడం
        const logo = new Image();
        logo.src = 'logo.png'; // మీ లోగో ఫైల్ పేరు ఇక్కడ ఇవ్వండి

        function drawScene() {
            // 1. బ్యాక్‌గ్రౌండ్
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. లోగో డ్రా చేయడం (కుడివైపు పైన)
            if (logo.complete) {
                ctx.globalAlpha = 0.7; // కొద్దిగా పారదర్శకంగా
                ctx.drawImage(logo, canvas.width - 150, 30, 100, 100);
                ctx.globalAlpha = 1.0;
            }

            // 3. నియాన్ గ్రిడ్ ఎఫెక్ట్
            ctx.strokeStyle = "rgba(0, 255, 255, 0.1)";
            for(let i=0; i<canvas.width; i+=80) { ctx.strokeRect(i, 0, 80, canvas.height); }

            // 4. నియాన్ టెక్స్ట్
            ctx.font = "bold 45px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.shadowColor = "#00ffff";
            ctx.shadowBlur = 15;
            ctx.fillStyle = "#ffffff";
            ctx.fillText(currentText, canvas.width/2, canvas.height/2);
            
            // కర్సర్
            if (Math.floor(Date.now() / 500) % 2) {
                let m = ctx.measureText(currentText);
                ctx.fillRect(canvas.width/2 + m.width/2 + 10, canvas.height/2 - 35, 5, 45);
            }
        }

        function animate() {
            if (charIndex <= message.length) {
                currentText = message.substring(0, charIndex);
                charIndex++;
                setTimeout(() => requestAnimationFrame(animate), 100); // టైపింగ్ వేగం
            } else {
                drawScene();
                requestAnimationFrame(animate);
            }
            drawScene();
        }

        async function startProduction() {
            status.innerText = "వీడియో ప్రాసెస్ అవుతోంది...";
            charIndex = 0;
            chunks = [];
            
            audio.play(); // మ్యూజిక్ స్టార్ట్

            const stream = canvas.captureStream(30);
            
            // ఆడియోను కూడా వీడియోలోకి చేర్చడం
            const audioStream = audio.captureStream ? audio.captureStream() : audio.mozCaptureStream();
            const combinedStream = new MediaStream([...stream.getTracks(), ...audioStream.getTracks()]);

            const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'STGV_Future_Video.webm';
                a.click();
                audio.pause();
                audio.currentTime = 0;
                status.innerText = "డౌన్‌లోడ్ పూర్తయింది!";
            };

            recorder.start();
            animate();

            setTimeout(() => recorder.stop(), 8000); // 8 సెకన్ల వీడియో
        }

        logo.onload = drawScene;
    </script>
</body>
</html>
